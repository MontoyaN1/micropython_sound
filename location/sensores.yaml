# Configuración de sensores para sistema de monitoreo acústico
# Sistema de coordenadas relativas para plano de 57x66 baldosas
# (57 baldosas × 0.3m = 17.1m de ancho, 66 baldosas × 0.3m = 19.8m de profundidad)
#
# Formato:
#   x: 0-57 baldosas (derecha=0, izquierda=57)
#   y: 0-66 baldosas (abajo=0, arriba=66)
#   coordinates_type: "relative" para coordenadas relativas en baldosas
#   room: Nombre descriptivo de la ubicación
#
# Equivalencia:
#   1 baldosa = 0.3 metros (30 cm)
#   Ancho: 57 baldosas = 17.1 metros
#   Alto: 66 baldosas = 19.8 metros

microcontrollers:
  micro_E1:
    location: [20, 7]
    coordinates_type: "relative"
    room: "Entrada Izquierda"

  micro_E2:
    location: [41, 11]
    coordinates_type: "relative"
    room: "Entrada Derecha"

  micro_E3:
    location: [50, 23]
    coordinates_type: "relative"
    room: "Lateral Derecho"

  micro_E4:
    location: [7, 23]
    coordinates_type: "relative"
    room: "Lateral Izquierda"

  micro_E5:
    location: [23, 40]
    coordinates_type: "relative"
    room: "Centro"

  micro_E6:
    location: [49, 41]
    coordinates_type: "relative"
    room: "Domo"

  micro_E7:
    location: [7, 56]
    coordinates_type: "relative"
    room: "Cuarto Superior"

  micro_E8:
    location: [36, 61]
    coordinates_type: "relative"
    room: "Superior Medio"

  micro_E9:
    location: [49, 61]
    coordinates_type: "relative"
    room: "Esquina Superior Derecha"

# Notas:
# 1. El sistema convierte automáticamente (x, y) a (latitude=y, longitude=x) para el frontend
# 2. Para coordenadas GPS reales, cambiar coordinates_type a "gps" y usar [latitud, longitud]
# 3. El frontend espera coordenadas en formato: latitude = y, longitude = x
# 4. El origen (0,0) está en la esquina inferior derecha del plano
